spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/keenetic_metrics
    username: ${DB_USER:keenetic_admin}
    password: ${DB_PASSWORD:SuperSecretPassword123}
  jpa:
    hibernate:
      ddl-auto: update # На сервере таблицы создаются автоматически, но данные никогда не стираются
    show-sql: false
telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
    name: ${TELEGRAM_BOT_NAME}
  base:
    url: ${TELEGRAM_BASE_URL:https://telegram.org}
